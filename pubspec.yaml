name: whatsapp_bot_container
description: "WhatsApp Bot Container — Flutter + Baileys Node.js"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Estado e Injeção de Dependência ──────────────────────────────────────
  provider: ^6.1.2

  # ── Banco de Dados Local ─────────────────────────────────────────────────
  sqflite: ^2.4.2
  path: ^1.9.0

  # ── Serviço em Segundo Plano (Android) ───────────────────────────────────
  # Mantém o app ativo como Foreground Service para que o Node.js não seja morto
  flutter_foreground_task: ^9.2.1

  # ── Wakelock — Impede que a CPU durma ────────────────────────────────────
  wakelock_plus: ^1.5.0

  # ── Permissões em Runtime ────────────────────────────────────────────────
  permission_handler: ^12.0.1

  # ── Utilitários ──────────────────────────────────────────────────────────
  path_provider: ^2.1.4
  shared_preferences: ^2.5.4
  intl: ^0.20.2

  # ── UI ───────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Versão 5.0.0 é a correta para o SDK 3.5.0 do Flutter 3.24.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/nodejs-project/
