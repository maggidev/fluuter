name: Flutter Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Versão 3.24.0 ou superior para suportar o Dart 3.5.0 exigido pelo flutter_lints 5.0.0
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK Debug
        # O --split-per-abi gera APKs menores para cada tipo de processador
        run: flutter build apk --debug --split-per-abi -v

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: bot-whatsapp-apks
          # O asterisco *.apk garante que ele pegue todos os arquivos gerados pelo split
          path: build/app/outputs/flutter-apk/*.apk
